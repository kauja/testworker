version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ['dependencies']
    groups:
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
          - '@next/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ['dependencies', 'ci']

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    labels: ['dependencies', 'docker']
