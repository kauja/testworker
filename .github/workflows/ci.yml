name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: typecheck / lint / build (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -r run typecheck

      - name: prettier check
        run: pnpm exec prettier --check .

      - name: web lint
        run: pnpm --filter @testworker/web run lint

      - name: build api
        run: pnpm --filter @testworker/api run build

      - name: build web
        run: pnpm --filter @testworker/web run build

  docker:
    name: docker build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build all images
        run: docker compose --profile tools build
