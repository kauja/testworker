name: secret-scan

# gitleaks-action v2 は organization 向けに GITLEAKS_LICENSE secret を必須化しており、
# OSS リポジトリでは license 取得が現実的ではない (commercial use 扱いの compliance
# リスクも避けたい)。 代わりに OSS で license 不要な trufflehog OSS action に
# 差し替える (Issue #80)。 PR では base..head の diff のみ scan、 push event では
# 全履歴を scan する。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # 全履歴を取得しないと PR の base..head diff scan に必要な commit が無い。
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          # PR event 時は base..head の diff のみ scan、 それ以外 (push / dispatch) は
          # `path: ./` のみで全 working tree を scan する。 trufflehog action は base /
          # head が空文字なら自動でファイル scan モードになる。
          path: ./
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # verified-only にすると現実的に動いている credential のみ報告する (例:
          # 文字列が AWS key の形だが invalid の場合は無視)。 false positive を減らし
          # PR レビューでのノイズを抑える。
          extra_args: --only-verified --fail
