          path: ./
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # verified-only にすると現実的に動いている credential のみ報告する (例:
          # 文字列が AWS key の形だが invalid の場合は無視)。 false positive を減らし
          # PR レビューでのノイズを抑える。
          extra_args: --only-verified
