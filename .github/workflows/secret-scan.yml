name: secret-scan

# pull_request_target を使う理由:
#   `pull_request` trigger は fork PR で GITHUB_TOKEN が read-only となり、 secrets も
#   渡らない。 gitleaks-action は GITHUB_TOKEN を必要とするため、 fork PR では leak を
#   検出してもコメント / artifact が記録できず status が常に green になり fail-open。
#   pull_request_target なら base repo の context (= write 可能な GITHUB_TOKEN と secrets)
#   が渡るため、 fork PR でも leak を検出できる。
#
# pull_request_target を安全に使う条件 (各 step で守る):
#   1. PR head ref をビルドしないなら通常 OK。 ここでは gitleaks に source 全体を
#      渡すため checkout に明示的に `ref: ${{ github.event.pull_request.head.sha }}` を
#      指定。 そして必要最小の permission に downscope する。
#   2. PR の中身を `pnpm install` 等で実行しない (gitleaks はファイル走査のみ)。

on:
  pull_request_target:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # gitleaks-action が PR comment するために必要

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # pull_request_target は default で base ref を checkout する。 fork PR の
          # diff を走査するために head.sha を明示する。 untrusted コードは実行しないので
          # checkout だけなら ref injection の余地は無い。
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
